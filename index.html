<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | purndal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #6366f1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .content {
            text-align: center;
            padding: 2rem;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            font-size: 1.125rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .line {
            width: 40px;
            height: 4px;
            background: var(--accent);
            margin: 2rem auto;
            border-radius: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="icon">🚧</div>
        <h1>Coming Soon</h1>
        <div class="line"></div>
        <p>현재 페이지를 준비하고 있습니다.<br>잠시만 기다려 주세요.</p>
    </div>
</body>
</html>
